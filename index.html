<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bulk License Generator v2.6 - Exact App Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .log { font-family: monospace; font-size: 13px; line-height: 1.5; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen p-8">
  <div class="max-w-6xl mx-auto">
    <h1 class="text-5xl font-bold text-green-400 mb-2">⚡ Bulk License Generator v2.6</h1>
    <p class="text-green-400">Exact JSON + 24-Hour Trial • Matches your app 100%</p>

    <!-- RULES HELPER -->
    <div class="bg-red-900 border-2 border-red-600 p-6 rounded-3xl my-8">
      <button onclick="copyRules()" class="w-full bg-white text-red-900 font-bold py-5 rounded-2xl text-xl">
        📋 Copy Rules & Open Write (Click First!)
      </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-1 bg-gray-900 rounded-3xl p-8 space-y-6">
        <div>
          <label class="block text-sm text-gray-400 mb-2">Base URL (Locked)</label>
          <input id="baseUrl" value="https://finalapp-dc38c-default-rtdb.firebaseio.com" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 text-green-400" readonly>
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Path</label>
          <input id="path" value="/Users" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:border-green-500 outline-none">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-2">Number of 24-Hour Licenses</label>
          <input id="count" type="number" value="150" class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-5 py-4 focus:border-green-500 outline-none">
        </div>

        <div class="flex gap-3">
          <button onclick="testConnection()" class="flex-1 bg-gray-700 hover:bg-gray-600 py-4 rounded-2xl">Test Connection</button>
          <button onclick="generateBulk()" class="flex-1 bg-green-500 hover:bg-green-600 py-4 rounded-2xl font-bold text-lg">🚀 GENERATE LICENSES</button>
        </div>
      </div>

      <div class="lg:col-span-2 bg-gray-900 rounded-3xl p-8">
        <div id="log" class="log bg-black h-96 overflow-y-auto p-6 rounded-2xl text-green-300"></div>
      </div>
    </div>

    <div id="tableContainer" class="mt-12"></div>
  </div>

  <script>
    let generated = [];

    function log(msg, type = "info") {
      const logEl = document.getElementById("log");
      const time = new Date().toLocaleTimeString();
      const color = type === "success" ? "text-green-400" : "text-red-400";
      logEl.innerHTML += `<span class="\( {color}">[ \){time}] ${msg}</span><br>`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function copyRules() {
      navigator.clipboard.writeText(`{
  "rules": {
    ".read": true,
    ".write": true
  }
}`);
      alert("✅ Rules copied! Paste in Firebase Console → Rules tab → Publish");
    }

    async function testConnection() {
      const base = document.getElementById("baseUrl").value.trim();
      const path = document.getElementById("path").value.trim();
      try {
        const res = await fetch(`\( {base} \){path}.json?shallow=true`);
        log(res.ok ? "✅ Connection OK" : `❌ HTTP ${res.status}`, res.ok ? "success" : "error");
      } catch (e) {
        log("❌ " + e.message, "error");
      }
    }

    async function generateDeviceId() {
      const data = new TextEncoder().encode(crypto.randomUUID() + Date.now());
      const hash = await crypto.subtle.digest("SHA-256", data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('').slice(0,16).toLowerCase();
    }

    function formatDate(date) {
      const pad = n => String(n).padStart(2, '0');
      return `\( {pad(date.getDate())}- \){pad(date.getMonth()+1)}-${date.getFullYear()} \( {pad(date.getHours())}: \){pad(date.getMinutes())}`;
    }

    async function generateBulk() {
      generated = [];
      const baseUrl = document.getElementById("baseUrl").value.trim();
      const path = document.getElementById("path").value.trim();
      const count = parseInt(document.getElementById("count").value) || 150;

      document.getElementById("log").innerHTML = "";
      log("🚀 Starting EXACT match generation...");

      for (let i = 0; i < count; i++) {
        const deviceId = await generateDeviceId();
        const now = new Date();
        const expiry = new Date(now.getTime() + 24 * 60 * 60 * 1000);

        const payload = {
          install_date: formatDate(now),
          expiry_date: formatDate(expiry)
        };

        try {
          const res = await fetch(`\( {baseUrl} \){path}/${deviceId}.json`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          });

          if (res.ok) {
            log(`✅ ${deviceId} uploaded`, "success");
          } else {
            const errText = await res.text();
            log(`❌ ${deviceId} → HTTP ${res.status} ${errText}`, "error");
          }
        } catch (e) {
          log(`❌ ${deviceId} → ${e.message}`, "error");
        }

        generated.push({deviceId, ...payload});
        await new Promise(r => setTimeout(r, 180));
      }

      log("🎉 All licenses generated with exact JSON your app expects!", "success");
      renderTable();
    }

    function renderTable() {
      let html = `<table class="w-full text-sm"><thead class="bg-gray-800"><tr><th class="p-4 text-left">Device ID</th><th class="p-4 text-left">Install Date</th><th class="p-4 text-left">Expiry Date (24h)</th></tr></thead><tbody class="divide-y divide-gray-800">`;
      generated.forEach(l => {
        html += `<tr class="hover:bg-gray-800"><td class="p-4 font-mono">\( {l.deviceId}</td><td class="p-4"> \){l.install_date}</td><td class="p-4 text-orange-400">${l.expiry_date}</td></tr>`;
      });
      html += `</tbody></table>`;
      document.getElementById("tableContainer").innerHTML = html;
    }

    tailwind.config = { content: ["**/*"] };
  </script>
</body>
</html>
